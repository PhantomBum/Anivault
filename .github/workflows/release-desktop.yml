# Build Windows NSIS installer and attach binaries to the GitHub Release for this tag.
#
# Note: `electron-forge publish --dry-run` / `--from-dry-run` has been unreliable in CI;
# we run `npm run make` then upload artifacts with softprops/action-gh-release.
#
# Release from PC: .\scripts\release-desktop.ps1 1.0.0-alpha.11  (bumps version, commits, tags, pushes)

name: Release desktop (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Print package version
        run: node -e "console.log('desktop/package.json version:', require('./package.json').version)"

      - name: Build Windows installer (NSIS)
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run make

      - name: List build output
        shell: pwsh
        run: |
          Write-Host "---- out/make/nsis/x64 ----"
          if (-not (Test-Path "out/make/nsis/x64")) {
            Write-Host "ERROR: out/make/nsis/x64 missing — build did not produce NSIS output."
            exit 1
          }
          Get-ChildItem -Path "out/make/nsis/x64" -File | ForEach-Object { Write-Host $_.FullName $_.Length }

      - name: Upload installer and updater metadata to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            desktop/out/make/nsis/x64/AniVaultSetup.exe
            desktop/out/make/nsis/x64/latest.yml
            desktop/out/make/nsis/x64/AniVaultSetup.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-${{ github.sha }}
          path: desktop/out/make/nsis/x64/
