# Build Windows Squirrel installer and attach binaries to the GitHub Release for this tag.
#
# Release: .\scripts\release-desktop.ps1 1.0.5
#
# Upload uses `gh release` (GitHub CLI) instead of glob-based actions — more reliable on Windows runners.

name: Release desktop (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Print package version
        run: node -e "console.log('desktop/package.json version:', require('./package.json').version)"

      - name: Build Windows installer (Squirrel)
        id: make
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run make

      - name: List build output
        if: success() || failure()
        shell: pwsh
        run: |
          Write-Host "---- desktop/out (recursive) ----"
          if (Test-Path "out") {
            Get-ChildItem -Path "out" -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          } else {
            Write-Host "no out/"
          }
          Write-Host "---- expect squirrel.windows x64 ----"
          $p = "out/make/squirrel.windows/x64"
          if (Test-Path $p) { Get-ChildItem $p -File | ForEach-Object { $_.Name, $_.Length } }

      - name: Verify Squirrel artifacts
        if: success() && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dir = Join-Path "${{ github.workspace }}" "desktop/out/make/squirrel.windows/x64"
          if (-not (Test-Path $dir)) { throw "Missing output directory: $dir" }
          $setup = Join-Path $dir "AniVaultUnvaultedSetup.exe"
          $yml = Join-Path $dir "latest.yml"
          if (-not (Test-Path $setup)) { throw "Missing $setup" }
          if (-not (Test-Path $yml)) { throw "Missing $yml (forge postMake hook)" }
          $nupkg = Get-ChildItem -Path $dir -Filter "*-full.nupkg" -File | Select-Object -First 1
          if (-not $nupkg) { throw "Missing *-full.nupkg under $dir" }
          Write-Host "OK: setup.exe, nupkg, latest.yml present."

      - name: Publish GitHub Release assets
        if: success() && startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          DIR="${GITHUB_WORKSPACE}/desktop/out/make/squirrel.windows/x64"
          if ! gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "$TAG" --verify-tag --repo "${GITHUB_REPOSITORY}" \
              --title "AniVault Unvaulted ${TAG}" \
              --notes "Windows Squirrel build (installer, nupkg, RELEASES, latest.yml). Changelog: [update-logs.txt](https://github.com/${GITHUB_REPOSITORY}/blob/main/desktop/src/renderer/data/update-logs.txt)." \
              "$DIR"/*
          else
            for f in "$DIR"/*; do
              [ -f "$f" ] || continue
              gh release upload "$TAG" "$f" --repo "${GITHUB_REPOSITORY}" --clobber
            done
          fi
