# Build and publish the Electron desktop app to GitHub Releases.
# Produces NSIS AniVaultSetup.exe + latest.yml (Felix NSIS maker + electron-updater-yaml) for electron-updater.
#
# Prerequisites:
# - App lives under `desktop/` (monorepo root = anivault).
#
# Release from your PC (easiest):  .\scripts\release-desktop.ps1 1.0.0-alpha.5
# That bumps desktop/package.json, commits, tags v1.0.0-alpha.5, pushes — this workflow runs on the tag.
#
# Manual run on GitHub: Actions → Release desktop (Windows) → Run workflow → branch main.
#   Uses whatever version is in desktop/package.json on that branch (no tag required).
#
# If Assets show only "Source code (zip/tar.gz)" and no AniVaultSetup.exe:
#   The job failed before upload — open Actions → failed run → expand "Build (dry-run)" or "Upload to GitHub Release".

name: Release desktop (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Print package version (must match tag vX when releasing from a tag)
        run: node -e "console.log('desktop/package.json version:', require('./package.json').version)"

      # Dry-run runs `make` and saves artifact paths; no GitHub upload yet.
      - name: Build installers (dry-run)
        run: npm run publish -- --dry-run

      - name: List Windows artifacts (expect AniVaultSetup.exe, latest.yml under out/make/nsis/x64)
        shell: pwsh
        run: |
          Write-Host "---- out/make (recursive) ----"
          if (Test-Path "out/make") {
            Get-ChildItem -Path "out/make" -Recurse -File | ForEach-Object { $_.FullName }
          } else {
            Write-Host "ERROR: out/make missing — build failed."
            exit 1
          }

      # Upload only; uses saved dry-run state (no second full compile).
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish -- --from-dry-run
