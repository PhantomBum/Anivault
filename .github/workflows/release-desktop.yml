# Build Windows Squirrel installer and attach binaries to the GitHub Release for this tag.
#
# Release: .\scripts\release-desktop.ps1 1.0.0

name: Release desktop (Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Print package version
        run: node -e "console.log('desktop/package.json version:', require('./package.json').version)"

      - name: Build Windows installer (Squirrel)
        id: make
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: npm run make

      - name: List build output
        if: success() || failure()
        shell: pwsh
        run: |
          Write-Host "---- desktop/out (recursive) ----"
          if (Test-Path "out") {
            Get-ChildItem -Path "out" -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          } else {
            Write-Host "no out/"
          }
          Write-Host "---- expect squirrel.windows x64 ----"
          $p = "out/make/squirrel.windows/x64"
          if (Test-Path $p) { Get-ChildItem $p -File | ForEach-Object { $_.Name, $_.Length } }

      - name: Upload Windows installer artifacts to release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: ${{ github.workspace }}/desktop/out/make/squirrel.windows/x64/*
          file_glob: true
          overwrite: true
