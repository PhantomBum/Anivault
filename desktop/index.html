<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <title>AniVault Unvaulted</title>
    <link rel="icon" type="image/png" href="./icon-rounded.png" />
    <!--
      No CSP meta here: Electron loads this UI from file:// or anivault://; strict
      script-src 'self' often blocks bundled scripts (opaque origin with custom schemes).
      Security relies on contextIsolation + preload, not remote HTML in the shell.
    -->
    <link rel="stylesheet" href="/src/renderer/styles/global.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/renderer/renderer.ts"></script>
  </body>
</html>
